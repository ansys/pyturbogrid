name: Release Please

on:
  push:
    branches:
      - main
      - 'releases/**'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:    
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.PYANSYS_CI_BOT_TOKEN }}
          target-branch: ${{ github.ref_name }}

      - uses: actions/checkout@v6
        if: ${{ steps.release.outputs.release_created }}
 
      - name: Update Latest vX and vX.Y Tag
        uses: ./.github/actions/tag-repository-version
        # uses: ansys-internal/actions/tag-repository-version@v6
        if: ${{ steps.release.outputs.release_created }}
        with:
          gh-token: ${{ secrets.PYANSYS_CI_BOT_TOKEN }}
          release-version: ${{ steps.release.outputs.tag_name }}
